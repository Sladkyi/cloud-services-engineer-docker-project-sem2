name: momo-store

services:
  backend:
    image: ${DOCKER_USER:-sladkyi}/docker-project-backend:latest
    build:
      context: ./backend
    expose:
      - "8081"
    networks:
      - backend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    profiles: ["dev", "prod"]

  frontend:
    image: ${DOCKER_USER:-sladkyi}/docker-project-frontend:latest
    build:
      context: ./frontend
      args:
        VUE_APP_API_URL: /api
    expose:
      - "8080"
    networks:
      - frontend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=16m
      - /var/cache/nginx:rw,size=16m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    profiles: ["dev", "prod"]

  nginx:
    image: ${DOCKER_USER:-sladkyi}/docker-project-nginx:latest
    build:
      context: ./nginx
    ports:
      - "${NGINX_HOST_PORT:-80}:8080"
    networks:
      - frontend_net
      - backend_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=16m
      - /var/cache/nginx:rw,size=16m
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
    profiles: ["dev", "prod"]

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
