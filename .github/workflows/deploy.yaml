name: Docker Project Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          uses: actions/checkout@v3
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v2
        - name: Login to Docker
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: Push Backend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/docker-project-backend:latest
        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/docker-project-frontend:latest
        - name: Push Nginx to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./nginx/
            push: true
            tags: ${{ secrets.DOCKER_USER }}/docker-project-nginx:latest

  run-with-docker-compose:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build via Docker Compose
        uses: hoverkraft-tech/compose-action@v2.2.0
        with:
          compose-flags: "--profile dev"
          up-flags: "--build"

  trivy-scan:
    name: Trivy scan
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    strategy:
      fail-fast: false
      matrix:
        image:
          - docker-project-backend
          - docker-project-frontend
          - docker-project-nginx
    steps:
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USER }}/${{ matrix.image }}:latest
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
